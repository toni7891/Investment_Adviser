AWSTemplateFormatVersion: "2010-09-09"
Description: >
  4RCH3R Investment Manager - single EC2 instance behind Nginx,
  MongoDB Atlas (external), AWS Bedrock for AI chat,
  secrets in SSM Parameter Store.

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: Free tier = t3.micro (750 hrs/month for 12 months)

  MongoUri:
    Type: String
    NoEcho: true
    Description: MongoDB Atlas connection string (mongodb+srv://...)

  CorsOrigins:
    Type: String
    Default: ""
    Description: >
      Comma-separated allowed CORS origins e.g. http://1.2.3.4,https://yourdomain.com.
      Leave blank to allow all origins - tighten after you know your IP/domain.

  LlmBackend:
    Type: String
    Default: bedrock
    AllowedValues:
      - bedrock
      - groq
      - lmstudio
      - ollama
    Description: AI backend. bedrock is recommended for cloud deployments.

  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: AWS region for Bedrock API calls

  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Bedrock model ID (Haiku = cheapest, ~$0.80/1M tokens)

  GroqApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Groq API key - only needed when LlmBackend=groq

  GitRepoUrl:
    Type: String
    Default: ""
    Description: >
      HTTPS URL of your GitHub repo.
      Leave blank to skip git clone - deploy manually via scp/rsync.

  GitBranch:
    Type: String
    Default: main
    Description: Branch to check out (ignored if GitRepoUrl is blank)

  EnableSsl:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: >
      Set to true only when you have a real domain pointed at the Elastic IP.
      Certbot will be run automatically.

  DomainName:
    Type: String
    Default: ""
    Description: Your domain name (required when EnableSsl=true)

  AdminEmail:
    Type: String
    Default: ""
    Description: Email for Let's Encrypt certificate (required when EnableSsl=true)

Conditions:
  UseGroq:
    Fn::Equals:
      - !Ref LlmBackend
      - "groq"

Resources:

  # Networking

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone:
        Fn::Select:
          - 0
          - Fn::GetAZs: ""
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-subnet"

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-rt"

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # Security Group

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 4RCH3R app traffic
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  # IAM

  Ec2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ec2-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
      Policies:
        - PolicyName: SsmParameterRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParametersByPath
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/investment-manager/*"
        - PolicyName: BedrockInvoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AWS::StackName}-instance-profile"
      Roles:
        - !Ref Ec2Role

  # SSM Parameter Store secrets

  ParamMongoUri:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /investment-manager/MONGO_URI
      Type: String
      Value: !Ref MongoUri
      Description: MongoDB Atlas URI

  ParamLlmBackend:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /investment-manager/LLM_BACKEND
      Type: String
      Value: !Ref LlmBackend

  ParamBedrockRegion:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /investment-manager/BEDROCK_REGION
      Type: String
      Value: !Ref BedrockRegion

  ParamBedrockModelId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /investment-manager/BEDROCK_MODEL_ID
      Type: String
      Value: !Ref BedrockModelId

  ParamCorsOrigins:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /investment-manager/CORS_ORIGINS
      Type: String
      Value: !Ref CorsOrigins

  ParamGroqApiKey:
    Type: AWS::SSM::Parameter
    Condition: UseGroq
    Properties:
      Name: /investment-manager/GROQ_API_KEY
      Type: String
      Value: !Ref GroqApiKey

  # EC2 Instance

  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-eip"

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref AppInstance
      AllocationId: !GetAtt ElasticIP.AllocationId

  AppInstance:
    Type: AWS::EC2::Instance
    DependsOn: VPCGatewayAttachment
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-app"
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -euxo pipefail
            exec > >(tee /var/log/userdata.log | logger -t user-data) 2>&1

            dnf update -y
            dnf install -y python3.11 python3.11-pip nginx git

            python3.11 -m pip install --upgrade pip

            APP_DIR=/opt/investment_manager

            if [ "${GitRepoUrl}" != "" ]; then
              git clone --branch ${GitBranch} ${GitRepoUrl} $APP_DIR
            else
              mkdir -p $APP_DIR
              echo "Manual deploy: scp your project files to $APP_DIR" > $APP_DIR/README_DEPLOY.txt
            fi

            cd $APP_DIR
            if [ -f requirements.txt ]; then
              python3.11 -m pip install -r requirements.txt
            fi

            cat > /etc/systemd/system/investment-manager.service <<'SERVICE'
            [Unit]
            Description=4RCH3R Investment Manager (FastAPI)
            After=network.target

            [Service]
            User=nobody
            Group=nobody
            WorkingDirectory=/opt/investment_manager
            ExecStart=/usr/local/bin/uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 1
            Restart=always
            RestartSec=5
            StandardOutput=journal
            StandardError=journal
            SyslogIdentifier=investment-manager
            Environment=AWS_DEFAULT_REGION=${AWS::Region}

            [Install]
            WantedBy=multi-user.target
            SERVICE

            systemctl daemon-reload
            systemctl enable investment-manager

            if [ -f $APP_DIR/backend/main.py ]; then
              systemctl start investment-manager
            fi

            cat > /etc/nginx/conf.d/investment-manager.conf <<'NGINX'
            server {
                listen 80 default_server;
                server_name _;

                location / {
                    proxy_pass         http://127.0.0.1:8000;
                    proxy_http_version 1.1;
                    proxy_set_header   Host              $host;
                    proxy_set_header   X-Real-IP         $remote_addr;
                    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_read_timeout 310s;
                    proxy_send_timeout 310s;
                    client_max_body_size 50M;
                }
            }
            NGINX

            rm -f /etc/nginx/conf.d/default.conf
            nginx -t && systemctl enable --now nginx

            if [ "${EnableSsl}" = "true" ] && [ "${DomainName}" != "" ]; then
              dnf install -y augeas-libs
              python3.11 -m pip install certbot certbot-nginx
              certbot --nginx \
                --non-interactive \
                --agree-tos \
                --email "${AdminEmail}" \
                -d "${DomainName}" \
                --redirect
              echo "0 3 * * * root certbot renew --quiet" > /etc/cron.d/certbot-renew
            fi

            echo "UserData complete"

  # CloudWatch Log Group

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/investment-manager/${AWS::StackName}"
      RetentionInDays: 30

Outputs:
  PublicIP:
    Description: Elastic IP - point your domain here or use it directly
    Value: !Ref ElasticIP
    Export:
      Name: !Sub "${AWS::StackName}-PublicIP"

  AppUrl:
    Description: HTTP URL of the running app
    Value: !Sub "http://${ElasticIP}"

  SshCommand:
    Description: SSH into the instance
    Value: !Sub "ssh -i ~/.ssh/${KeyPairName}.pem ec2-user@${ElasticIP}"

  AppDir:
    Description: App directory on the instance
    Value: /opt/investment_manager

  LogCommand:
    Description: Stream app logs
    Value: "journalctl -fu investment-manager"

  SsmParamPath:
    Description: SSM Parameter Store path used by the app
    Value: /investment-manager/
