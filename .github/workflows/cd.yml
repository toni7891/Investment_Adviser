name: CD

# Fires only on pushed tags (v1.0.0, v1.0.1, ...) — pushing to main never
# triggers this. Deliberately opt-in: nothing here runs, and no AWS
# infrastructure is touched, until you push a tag yourself.
#
# One-time setup before the first tag push:
#   1. cd infra/bootstrap && terraform init && terraform apply
#      (creates the S3 state bucket + DynamoDB lock table)
#   2. Fill in infra/backend.hcl from the bootstrap output (gitignored, local only)
#   3. Add the GitHub Secrets listed below (Settings → Secrets and variables → Actions)
#
# Required secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY   — deploy IAM user/role
#   TF_STATE_BUCKET, TF_STATE_DYNAMODB_TABLE   — from bootstrap output
#   TF_VAR_KEY_PAIR_NAME                       — existing EC2 key pair name
#   TF_VAR_MONGO_URI, TF_VAR_JWT_SECRET_KEY, TF_VAR_INTERNAL_API_KEY
# Optional secrets (see infra/variables.tf for the rest, all have defaults):
#   TF_VAR_DOMAIN_NAME, TF_VAR_ADMIN_EMAIL, TF_VAR_ALERT_EMAIL, TF_VAR_GIT_REPO_URL

on:
  push:
    tags:
      - "v*"

jobs:
  provision:
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.tf_outputs.outputs.instance_id }}
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=investment-manager/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION || 'us-east-1' }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform apply
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_key_pair_name: ${{ secrets.TF_VAR_KEY_PAIR_NAME }}
          TF_VAR_mongo_uri: ${{ secrets.TF_VAR_MONGO_URI }}
          TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_internal_api_key: ${{ secrets.TF_VAR_INTERNAL_API_KEY }}
          TF_VAR_domain_name: ${{ secrets.TF_VAR_DOMAIN_NAME }}
          TF_VAR_admin_email: ${{ secrets.TF_VAR_ADMIN_EMAIL }}
          TF_VAR_alert_email: ${{ secrets.TF_VAR_ALERT_EMAIL }}
          TF_VAR_git_repo_url: ${{ secrets.TF_VAR_GIT_REPO_URL }}
          TF_VAR_git_branch: main

      - id: tf_outputs
        run: echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  redeploy:
    # The EC2 instance only runs userdata.sh once, at first boot — a plain
    # `terraform apply` on an already-running instance won't pick up new app
    # code. This step pushes the new tag's code onto the running instance via
    # SSM Run Command (the instance already has AmazonSSMManagedInstanceCore,
    # so no SSH/inbound port needed).
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Pull latest code + restart service via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ needs.provision.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ github.ref_name }}" \
            --parameters 'commands=[
              "cd /opt/investment_manager",
              "git fetch --tags",
              "git checkout ${{ github.ref_name }}",
              "python3.11 -m pip install -r requirements.txt",
              "systemctl restart investment-manager"
            ]' \
            --output text
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
