name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: ci-test-secret-not-used-in-prod
      LLM_BACKEND: bedrock
      BEDROCK_MODEL: anthropic.claude-haiku-4-5-20251001-v1:0
      BEDROCK_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt ruff

      - name: Lint
        run: ruff check backend/ tests/

      - name: Test
        run: python run_tests.py --coverage

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image (build-only, not pushed)
        run: docker build -t investment-manager:ci .

      - name: Smoke test container
        run: |
          docker run -d --name imgr-ci -p 8080:80 -e JWT_SECRET_KEY=ci-smoke-secret investment-manager:ci
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/status; then echo; break; fi
            sleep 1
          done
          curl -sf http://localhost:8080/status | grep -q '"status":"online"'
          docker logs imgr-ci
          docker rm -f imgr-ci
