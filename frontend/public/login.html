<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4RCH3R — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void:     #060a0f;
      --bg:       #0b1018;
      --panel:    #0f1822;
      --surface:  #162028;
      --raised:   #1b2a38;
      --hover:    #1f3046;
      --amber:    #f0b429;
      --amber-lo: rgba(240,180,41,0.10);
      --gain:     #00d97e;
      --loss:     #ff4560;
      --blue:     #3d9cf0;
      --text:     #d8e4ee;
      --text-dim: #6b879e;
      --text-xd:  #2e4a60;
      --border:   #1e293b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .auth-logo {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--amber);
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .auth-tagline {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .auth-tab {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      padding: 0.6rem 0;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .auth-tab.active {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }

    .auth-error {
      background: rgba(255,69,96,0.12);
      border: 1px solid rgba(255,69,96,0.3);
      border-radius: 4px;
      color: #f87171;
      font-size: 0.7rem;
      padding: 0.6rem 0.8rem;
      margin-bottom: 1rem;
    }

    .auth-error.hidden { display: none; }

    .field-group {
      margin-bottom: 1rem;
    }

    .field-group label {
      display: block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }

    .field-group input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      padding: 0.6rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .field-group input:focus {
      border-color: var(--amber);
    }

    .auth-submit {
      width: 100%;
      background: var(--amber);
      border: none;
      border-radius: 4px;
      color: var(--void);
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      margin-top: 1.5rem;
      padding: 0.75rem;
      transition: opacity 0.15s;
    }

    .auth-submit:hover   { opacity: 0.88; }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .force-change {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .force-change p {
      font-size: 0.68rem;
      color: var(--amber);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    .force-change.hidden { display: none; }

  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">INVESTMENT TERMINAL</div>
    <div class="auth-tagline">portfolio intelligence terminal</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin">LOGIN</button>
      <button class="auth-tab"        id="tabSignup">SIGN UP</button>
    </div>

    <div class="auth-error hidden" id="authError"></div>

    <form id="authForm" autocomplete="on" novalidate>
      <div class="field-group">
        <label for="authUsername">USERNAME</label>
        <input id="authUsername" type="text" autocomplete="username" spellcheck="false" />
      </div>
      <div class="field-group">
        <label for="authPassword">PASSWORD</label>
        <input id="authPassword" type="password" autocomplete="current-password" />
      </div>
      <button class="auth-submit" type="button" id="authSubmit">LOGIN</button>
    </form>

    <div class="force-change hidden" id="forceChange">
      <p>You are using a temporary password. Please set a new one before continuing.</p>
      <div class="field-group">
        <label for="newPassword">NEW PASSWORD</label>
        <input id="newPassword" type="password" autocomplete="new-password" />
      </div>
      <button class="auth-submit" id="changePasswordBtn">UPDATE PASSWORD</button>
    </div>

  </div>

  <script type="module">
    let isSignup      = false;
    let pendingToken  = null;
    let pendingUser   = null;
    let isSubmitting  = false;
    let isChangingPw  = false;

    const tabLogin    = document.getElementById("tabLogin");
    const tabSignup   = document.getElementById("tabSignup");
    const authForm    = document.getElementById("authForm");
    const authSubmit  = document.getElementById("authSubmit");
    const authError   = document.getElementById("authError");
    const forceChange = document.getElementById("forceChange");
    const newPassword = document.getElementById("newPassword");
    const changePwBtn = document.getElementById("changePasswordBtn");

    // If already logged in, skip to home
    if (localStorage.getItem("authToken")) {
      window.location.replace("/");
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.classList.remove("hidden");
    }

    function hideError() {
      authError.classList.add("hidden");
    }

    function setTab(signup) {
      isSignup = signup;
      tabLogin.classList.toggle("active",  !signup);
      tabSignup.classList.toggle("active",  signup);
      authSubmit.textContent = signup ? "CREATE ACCOUNT" : "LOGIN";
      hideError();
    }

    tabLogin.addEventListener("click",  () => setTab(false));
    tabSignup.addEventListener("click", () => setTab(true));

    document.getElementById("authUsername").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
    document.getElementById("authPassword").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
    authSubmit.addEventListener("click", doLogin);

    async function doLogin() {
      if (isSubmitting) return;
      hideError();
      const username = document.getElementById("authUsername").value.trim();
      const password = document.getElementById("authPassword").value;

      if (!username || !password) { showError("Username and password are required."); return; }

      isSubmitting = true;
      authSubmit.textContent = isSignup ? "CREATING…" : "LOGGING IN…";

      try {
        const endpoint = isSignup ? "/api/auth/signup" : "/api/auth/login";
        const resp     = await fetch(endpoint, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ username, password }),
        });
        const data = await resp.json();

        if (!resp.ok) {
          showError(data.detail || "Authentication failed.");
          return;
        }

        pendingToken = data.access_token;
        pendingUser  = { username: data.username, role: data.role };

        if (!isSignup && data.force_password_change) {
          authForm.style.display = "none";
          forceChange.classList.remove("hidden");
          newPassword.focus();
          return;
        }

        finishLogin();
      } catch {
        showError("Network error — is the server running?");
      } finally {
        isSubmitting = false;
        authSubmit.textContent = isSignup ? "CREATE ACCOUNT" : "LOGIN";
      }
    }

    newPassword.addEventListener("keydown", (e) => { if (e.key === "Enter") changePwBtn.click(); });

    changePwBtn.addEventListener("click", async () => {
      if (isChangingPw) return;
      const pw = newPassword.value.trim();
      if (pw.length < 6) { showError("Password must be at least 6 characters."); return; }

      isChangingPw = true;
      changePwBtn.textContent = "UPDATING…";
      hideError();

      try {
        const resp = await fetch("/api/auth/change-password", {
          method:  "PATCH",
          headers: {
            "Content-Type":  "application/json",
            "Authorization": `Bearer ${pendingToken}`,
          },
          body: JSON.stringify({ new_password: pw }),
        });

        if (!resp.ok) {
          const d = await resp.json().catch(() => ({}));
          showError(d.detail || "Password update failed.");
          return;
        }

        // Server returns a fresh, fully-scoped token after the password change
        const data = await resp.json();
        if (data.access_token) pendingToken = data.access_token;
        finishLogin();
      } catch {
        showError("Network error.");
      } finally {
        isChangingPw = false;
        changePwBtn.textContent = "UPDATE PASSWORD";
      }
    });

    function finishLogin() {
      localStorage.setItem("authToken",    pendingToken);
      localStorage.setItem("currentUser",  JSON.stringify(pendingUser));
      window.location.replace("/");
    }
  </script>
</body>
</html>
