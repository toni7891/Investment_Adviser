<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Strategist Dashboard</title>
    <link rel="stylesheet" href="static/style.css?v=2.3">
</head>
<body>
<div id="app">
    <nav class="sidebar">
        <a href="#dashboard">Dashboard</a>
        <a href="#holdings">Holdings</a>
        <a href="#settings">Settings</a>
    </nav>
    <main class="main-section">
        <section class="portfolio-summary">
            <h2>Portfolio Summary</h2>
            <p>Invested: <span id="invested">$0.00</span></p>
            <p>Cash: <span id="cash">$0.00</span></p>
            <p id="breakdown">0% Invested / 0% Cash</p>
        </section>
        <section class="daily-change">
            <h2>Daily Change</h2>
            <p id="dailyChange">+/- $0.00</p>
        </section>
        <section class="top-performer">
            <h2>Top Performer</h2>
            <div id="topPerformer">
                <!-- Top performer details will be displayed here -->
            </div>
        </section>
    </main>
    <footer class="strategist-chat">
        <input type="text" id="chatInput" placeholder="Type your question...">
        <button id="sendButton">Send</button>
        <div id="chatOutput"></div>
    </footer>
</div>

    <script src="/static/dashboard.js?v=20260424T101800"></script>
</body>
</html>
