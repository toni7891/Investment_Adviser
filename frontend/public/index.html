<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4RCH3R · Investment Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=6.0">
  <link rel="icon" href="data:,">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       LANDING PAGE
  ═══════════════════════════════════════════ -->
  <div id="landing-page" class="page">

    <!-- Background system -->
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--a" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--b" aria-hidden="true"></div>

    <div class="landing-wrap">

      <!-- Hero -->
      <header class="landing-hero">
        <div class="hero-brand">
          <div class="hero-mark" aria-hidden="true">
            <span class="hero-mark__ring"></span>
            <span class="hero-mark__glyph">◆</span>
          </div>
          <div class="hero-copy">
            <p class="hero-eyebrow">STRATEGIST PLATFORM · v2.0</p>
            <h1 class="hero-title">INVESTMENT TERMINAL</h1>
          </div>
        </div>
        <div class="hero-meta">
          <div class="hero-sys-status">
            <span class="sys-dot"></span>
            <span>SYSTEM ONLINE</span>
          </div>
          <div class="hero-clock" id="sysTime"></div>
          <button id="accountBtn" style="background:none;border:1px solid #2e4a60;border-radius:4px;color:#6b879e;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;padding:0.3rem 0.7rem;">ACCOUNT</button>
          <button id="logoutBtn" style="background:none;border:1px solid #2e4a60;border-radius:4px;color:#6b879e;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;padding:0.3rem 0.7rem;">LOGOUT</button>
        </div>
      </header>

      <!-- Divider rule -->
      <div class="hero-rule" aria-hidden="true">
        <span class="rule-line"></span>
        <span class="rule-center">◈</span>
        <span class="rule-line"></span>
      </div>

      <!-- Body: Upload + Portfolios -->
      <div class="landing-body">

        <!-- Upload Zone -->
        <div class="upload-zone" id="uploadDropZone">
          <div class="upload-zone__header">
            <span class="upload-zone__tag">// IMPORT DATA</span>
            <span class="upload-zone__hint">XLSX · XLS</span>
          </div>
          <div class="upload-zone__inner">
            <div class="upload-icon-box" aria-hidden="true">
              <span class="upload-icon-arrow">↑</span>
            </div>
            <div class="upload-zone__copy">
              <h3>Upload Portfolio</h3>
              <p>Drag &amp; drop your Excel file here, or click below</p>
            </div>
            <label id="uploadPortfolioButton" class="btn-upload" for="portfolioUpload" role="button" tabindex="0">
              CHOOSE FILE
            </label>
            <input id="portfolioUpload" type="file" accept=".xlsx,.xls" class="file-input">
          </div>
          <div id="uploadProgress" class="upload-progress hidden">
            <span class="spinner"></span>
            <span class="progress-label">PROCESSING…</span>
          </div>
        </div>

        <!-- Portfolios Panel -->
        <div class="portfolio-panel">
          <div class="panel-hdr">
            <div>
              <span class="panel-hdr__prefix">// </span>
              <span class="panel-hdr__title">PORTFOLIOS</span>
            </div>
            <span id="portfolioCount" class="panel-count"></span>
          </div>
          <div id="portfolioList" class="portfolio-grid">
            <p class="loading-state">Scanning collections…</p>
          </div>
        </div>

      </div><!-- .landing-body -->
    </div><!-- .landing-wrap -->
  </div><!-- #landing-page -->

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Confirm Dialog -->
  <div id="confirmModal" class="modal-overlay">
    <div class="modal-box modal-box--sm">
      <h3 id="confirmTitle" class="modal-hdr">CONFIRM</h3>
      <p id="confirmMessage" class="confirm-msg"></p>
      <div class="modal-foot">
        <button id="confirmCancelBtn" class="mbtn mbtn--cancel">CANCEL</button>
        <button id="confirmOkBtn" class="mbtn mbtn--danger">DELETE</button>
      </div>
    </div>
  </div>

  <!-- Account Settings Modal -->
  <div id="accountModal" class="modal-overlay">
    <div style="background:#0f1822;border:1px solid #1e293b;border-radius:8px;width:100%;max-width:420px;padding:2rem;font-family:'IBM Plex Mono',monospace;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
        <span style="font-size:0.7rem;font-weight:600;letter-spacing:0.2em;color:#f0b429;">ACCOUNT SETTINGS</span>
        <button id="accountModalClose" style="background:none;border:none;color:#6b879e;cursor:pointer;font-size:1rem;line-height:1;">✕</button>
      </div>

      <div id="accountModalError" style="display:none;background:rgba(255,69,96,0.12);border:1px solid rgba(255,69,96,0.3);border-radius:4px;color:#f87171;font-size:0.7rem;padding:0.6rem 0.8rem;margin-bottom:1rem;"></div>
      <div id="accountModalSuccess" style="display:none;background:rgba(0,217,126,0.1);border:1px solid rgba(0,217,126,0.3);border-radius:4px;color:#00d97e;font-size:0.7rem;padding:0.6rem 0.8rem;margin-bottom:1rem;"></div>

      <!-- Change Username -->
      <div style="margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid #1e293b;">
        <div style="font-size:0.65rem;font-weight:600;letter-spacing:0.15em;color:#6b879e;margin-bottom:1rem;">CHANGE USERNAME</div>
        <div style="margin-bottom:0.75rem;">
          <label style="display:block;font-size:0.65rem;font-weight:600;letter-spacing:0.12em;color:#6b879e;margin-bottom:0.4rem;">NEW USERNAME</label>
          <input id="newUsernameInput" type="text" spellcheck="false" autocomplete="username" style="width:100%;background:#162028;border:1px solid #1e293b;border-radius:4px;color:#d8e4ee;font-family:'IBM Plex Mono',monospace;font-size:0.8rem;padding:0.6rem 0.75rem;outline:none;" />
        </div>
        <div style="margin-bottom:0.75rem;">
          <label style="display:block;font-size:0.65rem;font-weight:600;letter-spacing:0.12em;color:#6b879e;margin-bottom:0.4rem;">CURRENT PASSWORD</label>
          <input id="usernameConfirmPassword" type="password" autocomplete="current-password" style="width:100%;background:#162028;border:1px solid #1e293b;border-radius:4px;color:#d8e4ee;font-family:'IBM Plex Mono',monospace;font-size:0.8rem;padding:0.6rem 0.75rem;outline:none;" />
        </div>
        <button id="changeUsernameBtn" style="background:#f0b429;border:none;border-radius:4px;color:#060a0f;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:0.7rem;font-weight:600;letter-spacing:0.15em;padding:0.6rem 1rem;transition:opacity 0.15s;">UPDATE USERNAME</button>
      </div>

      <!-- Change Password -->
      <div>
        <div style="font-size:0.65rem;font-weight:600;letter-spacing:0.15em;color:#6b879e;margin-bottom:1rem;">CHANGE PASSWORD</div>
        <div style="margin-bottom:0.75rem;">
          <label style="display:block;font-size:0.65rem;font-weight:600;letter-spacing:0.12em;color:#6b879e;margin-bottom:0.4rem;">CURRENT PASSWORD</label>
          <input id="currentPasswordInput" type="password" autocomplete="current-password" style="width:100%;background:#162028;border:1px solid #1e293b;border-radius:4px;color:#d8e4ee;font-family:'IBM Plex Mono',monospace;font-size:0.8rem;padding:0.6rem 0.75rem;outline:none;" />
        </div>
        <div style="margin-bottom:0.75rem;">
          <label style="display:block;font-size:0.65rem;font-weight:600;letter-spacing:0.12em;color:#6b879e;margin-bottom:0.4rem;">NEW PASSWORD</label>
          <input id="newPasswordInput" type="password" autocomplete="new-password" style="width:100%;background:#162028;border:1px solid #1e293b;border-radius:4px;color:#d8e4ee;font-family:'IBM Plex Mono',monospace;font-size:0.8rem;padding:0.6rem 0.75rem;outline:none;" />
        </div>
        <button id="changePasswordBtn" style="background:#f0b429;border:none;border-radius:4px;color:#060a0f;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:0.7rem;font-weight:600;letter-spacing:0.15em;padding:0.6rem 1rem;transition:opacity 0.15s;">UPDATE PASSWORD</button>
      </div>
    </div>
  </div>

  <!-- App Logic -->
  <script type="module" src="/static/app.js?v=6.0"></script>

  <script>
    (function() {
      function tickClock() {
        var t = new Date().toLocaleTimeString('en-GB', {hour12: false});
        var el = document.getElementById('sysTime');
        if (el) el.textContent = t + ' UTC';
      }
      tickClock();
      setInterval(tickClock, 1000);
    })();
  </script>

</body>
</html>
